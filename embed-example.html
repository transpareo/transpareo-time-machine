<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Recommended baseline Content-Security-Policy for a host
      page (defense-in-depth for the renderer's remote-content
      inputs: icon sprite, branding stylesheet, DPP
      artefacts). Tighten the https: sources to your CDN
      host(s); add the script origin if you serve embed.js
      from a CDN instead of your own host.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
        script-src 'self';
        style-src 'self' 'unsafe-inline' https:;
        font-src 'self' https: data:;
        img-src 'self' https: data: blob:;
        connect-src 'self' https:;
        object-src 'none';
        base-uri 'self';
        form-action 'self'"
    />
    <title>Embed example, Transpareo Time Machine</title>

    <!--
      ============================================================
      EMBED EXAMPLE: what a third-party host page looks like.
      ============================================================

      Canonical reference for embedding the Transpareo Time
      Machine via the single-file EMBED build (CSS inlined,
      one <script> tag, no build step on the host). This file
      is NOT shipped in the npm package; it lives in the repo
      as living documentation and a manual smoke test for the
      embed bundle.

      Run it locally:
        1. npm run seed         writes the demo DPP artefacts
                                under /public/<id>/dpp/<code>/
        2. npm run build:embed  writes dist-embed/embed.js
        3. Serve the repo root over HTTP so BOTH the built
           bundle (./dist-embed/embed.js) and the seeded
           artefacts (/nordic-wear-tshirt/...) resolve, then
           open /embed-example.html.

      A real host page differs in only two ways:
        - the <script src> points at wherever you deploy
          embed.js (your own host, unpkg, jsdelivr);
        - the element's `src` points at your published
          manifest.

      This example sets the full set of branding tokens the
      renderer reads inline (the :root block below), so it
      doubles as the canonical reference for them; the README
      "Theming" section points here. A real host page would
      instead link the publisher's branding stylesheet (the
      Style Editor export) and drop that block.
      ============================================================
    -->

    <style>
      /* Branding tokens the renderer reads. This is the full
         set (the Style Editor export shape); a real host links
         the publisher's branding.css instead of inlining it. */
      :root {
        /* Colour */
        --font-color: #3d3c3b;          /* body text */
        --background-color: #fff;       /* content card background */
        --body-background: #e2e1e0;     /* page background (the frame) */
        --action-color: #255dba;        /* accents: links, donut, chips */
        --link-color: #255dba;          /* anchor text */
        --footer-link-color: #255dba;   /* footer + history link */
        --footer-text-color: #828180;   /* muted text */

        /* Primary button (e.g. the EPCIS copy button) */
        --button-color-top: #3585d8;    /* gradient top stop */
        --button-color-bottom: #255dba; /* gradient bottom + border */
        --button-color-text: #fff;      /* button label */

        /* Rating smileys (set only when the publisher opts in) */
        --rating-very-bad: #ab2430;
        --rating-bad: #ab2430;
        --rating-neutral: #d4872a;
        --rating-good: #0a8340;
        --rating-very-good: #0a8340;

        /* Typography */
        --font-size: 16px;              /* body base size */
        --h1-size: 200%; --h1-weight: 700; --h1-style: normal;
        --h2-size: 150%; --h2-weight: 700; --h2-style: normal;
        --h3-size: 125%; --h3-weight: 600; --h3-style: normal;

        /* Logo + layout */
        --logo-url: url('/nordic-wear-tshirt/branding/logo.svg');
        --logo-width: 173px;
        --logo-height: 27px;
        --content-max-width: 830px;     /* card width on wide viewports */
        --content-radius: 10px;         /* card corner radius */
        --frame-width: 10px;            /* gap from top to the card */

        /* Exported by the Style Editor for theme completeness
           but not yet read by the SPA stylesheets: */
        --color-highlight: #255dba;
        --color-highlight-text: #fff;
      }

      body { margin: 0; font-family: system-ui, sans-serif; }
      .host-banner {
        padding: 16px 24px;
        background: #f5f5f5;
        border-bottom: 1px solid #ddd;
      }
      /* Boot spinner. Mirrors .ttm-boot from app.css so it is
         visible before the JS bundle parses. */
      .ttm-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }
      .ttm-boot::before {
        content: '';
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 4px solid color-mix(
          in oklab, var(--font-color, #222) 20%, transparent);
        border-top-color: color-mix(
          in oklab, var(--font-color, #222) 80%, transparent);
        animation: ttm-boot-spin 0.9s linear infinite;
      }
      @keyframes ttm-boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>

  </head>
  <body>
    <div class="host-banner">
      <strong>Host page</strong>, with an embedded
      <code>&lt;transpareo-time-machine&gt;</code> below.
    </div>

    <!--
      Host config is set via attributes on the element (no
      global). `src` is the DPP data source: a manifest URL,
      or a single snapshot URL. Optional config attributes:
        icons-src               content icon sprite URL
        revoked-roots-src       revocation endpoint ('' disables)
        show-verification-mark  'false' hides the verification chip
        pinned-platform-key     platform Ed25519 multikey set
                                (z..., whitespace-separated)
        pinned-issuer-key       issuer's declared multikey set
                                (z..., whitespace-separated)
        verifier                present: standalone verifier UI
        footer-copyright        footer text
        footer-links            JSON [{ label, url }, ...]
    -->
    <transpareo-time-machine
      src="/nordic-wear-tshirt/dpp/demo-2026-t001/manifest.json"
      footer-copyright="© 2026 Embed host"
      footer-links='[{"label":"Imprint","url":"#imprint"},{"label":"Privacy","url":"#privacy"}]'>
      <!-- Light-DOM fallback, shown before the element
           upgrades and routed through the shadow <slot>
           during the manifest fetch so the spinner stays
           put across both phases. -->
      <div class="ttm-boot" aria-label="Loading"></div>
    </transpareo-time-machine>

    <!-- The single-file embed build: CSS inlined, registers
         the custom element on load. In production point this
         at wherever you deploy embed.js. -->
    <script type="module" src="./dist-embed/embed.js"></script>
  </body>
</html>
