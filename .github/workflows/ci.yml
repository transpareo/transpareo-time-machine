# Continuous integration: type-check, run the test
# suite, and build the lib bundle. Runs on every push
# to master and on every pull request.
#
# `npm run seed` is intentionally NOT in this workflow.
# It downloads fixture images from upstream CDNs
# (Unsplash etc.) at runtime, which would make CI's
# pass/fail signal depend on third-party availability.
# Fixture schema regressions are caught by the
# downstream `npm run build` (the SPA imports the
# generated TS) and by local seed runs before pushing.
name: ci

on:
  push:
    branches: [master]
  pull_request:

# CI only reads the repo; nothing here may write. Actions
# are pinned to full commit SHAs (tags are mutable; a
# re-pointed tag would run unreviewed code). Dependabot
# keeps the pins fresh; the trailing comment names the tag
# each SHA was taken from.
permissions:
  contents: read

jobs:
  check:
    name: check (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run check:fixtures
      - run: npm test
      - run: npm run build
      - run: npm run build:embed
      # Emit SRI hashes for the lib build outputs and
      # enforce the gzipped bundle-size budgets (see
      # scripts/check-bundle-size.ts for the limits).
      # The embed bundle is measured out of dist-embed/,
      # so the embed build must run before the size gate.
      - run: npm run emit:sri
      - run: npm run check:bundle-size
      # Reproducible-build gate: build a second time and
      # diff the integrity manifest against the first
      # build. Runs only on Node 22 (the publish target)
      # so we don't double-build twice in the matrix.
      - if: matrix.node == '22'
        run: npm run check:reproducible
      # NOTE: the WCAG 2.2 AA gate (`npm run a11y`) is
      # NOT in this workflow. axe-core requires a
      # rendered SPA with fixture data, and `npm run
      # seed` (which materialises the fixture manifests
      # + branding stylesheets) downloads images from
      # upstream CDNs at runtime; running it here would
      # make CI's pass/fail signal depend on third-party
      # availability. Local contributors run
      # `npm run seed && npm run a11y` before pushing.
