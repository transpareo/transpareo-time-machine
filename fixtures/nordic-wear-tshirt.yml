  - id: evt-3a
    event_type: inspection
    occurred_at: 2024-11-05T10:30:00Z
    actor_label: TÜV SÜD (textile compliance)
    description:
      en: Annual textile labelling audit passed; care instructions and country-of-origin claims verified against production records.
      de: Jährliche Textilkennzeichnungsprüfung bestanden; Pflegehinweise und Herkunftsangaben mit den Produktionsnachweisen abgeglichen.
      fr: Audit annuel d'étiquetage textile réussi ; instructions d'entretien et déclarations d'origine vérifiées par rapport aux registres de production.
  - id: evt-4
    event_type: inspection
    occurred_at: 2025-01-15T11:30:00Z
    actor_label: OEKO-TEX certifying body
    description:
      en: OEKO-TEX Standard 100 audit passed; no harmful substances detected.
      de: OEKO-TEX-Standard-100-Audit bestanden; keine Schadstoffe nachgewiesen.
      fr: Audit OEKO-TEX Standard 100 réussi ; aucune substance nocive détectée.
  - id: evt-5
    event_type: inspection
    occurred_at: 2025-02-22T08:00:00Z
    actor_label: BAuA market surveillance
    description:
      en: Independent market-surveillance check passed. Sample composition matches the declared DPP within tolerance.
      de: Unabhängige Marktüberwachung bestanden. Probenzusammensetzung stimmt im Rahmen der Toleranz mit dem deklarierten DPP überein.
      fr: Contrôle indépendant de surveillance du marché réussi. La composition de l'échantillon correspond au DPP déclaré, dans les tolérances admises.
  - id: evt-6
    event_type: recalled
    occurred_at: 2025-04-18T16:30:00Z
    actor_label: Markus Weber
    status_from: in_use
    status_to: suspended
    description:
      en: Voluntary recall of batch BATCH-NW-2024-Q1-008 after a fabric weave defect was identified during routine QA testing.
      de: Freiwilliger Rückruf der Charge BATCH-NW-2024-Q1-008, nachdem bei einer routinemäßigen QS-Prüfung ein Webfehler festgestellt wurde.
      fr: Rappel volontaire du lot BATCH-NW-2024-Q1-008 après la détection d'un défaut de tissage lors d'un contrôle qualité de routine.
    version: 4
  - id: evt-7
    event_type: inspection
    occurred_at: 2025-06-05T15:20:00Z
    actor_label: Nordic Wear Quality Assurance
    description:
      en: "Corrective action completed for the suspended batch: manufacturing process recalibrated and supplier qualification re-confirmed."
      de: "Korrekturmaßnahme für die gesperrte Charge abgeschlossen: Fertigungsprozess neu kalibriert und Lieferantenqualifikation erneut bestätigt."
      fr: "Action corrective achevée pour le lot suspendu : processus de fabrication recalibré et qualification du fournisseur reconfirmée."
  - id: evt-7a
    event_type: repair
    occurred_at: 2025-06-09T10:00:00Z
    actor_label: Repair Workshop Hamburg
    description:
      en: "Loom #4 reweaved per corrective protocol; tension confirmed within tolerance."
      de: Webstuhl Nr. 4 gemäß Korrekturprotokoll neu aufgezogen; Spannung im Toleranzbereich.
      fr: Métier n°4 retissé selon le protocole correctif ; tension dans la tolérance.
  - id: evt-7b
    event_type: inspection
    occurred_at: 2025-06-12T09:30:00Z
    actor_label: OEKO-TEX certifying body
    description:
      en: Spot re-inspection of corrected batch; sample set passed all OEKO-TEX 100 criteria.
      de: Stichprobenkontrolle der korrigierten Charge; Probenset erfüllt alle OEKO-TEX 100 Kriterien.
      fr: Contrôle par sondage du lot corrigé ; échantillons conformes à OEKO-TEX 100.
  - id: evt-7c
    event_type: lifecycle_transition
    occurred_at: 2025-06-15T16:00:00Z
    actor_label: Anna Schmidt
    status_from: suspended
    status_to: in_use
    description:
      en: Limited resumption of distribution for the corrected batch only; full lift pending wider audit.
      de: Teilweise Wiederaufnahme des Vertriebs nur für die korrigierte Charge; vollständige Aufhebung nach erweitertem Audit.
      fr: Reprise limitée de la distribution pour le lot corrigé uniquement ; levée complète après audit élargi.
  - id: evt-8
