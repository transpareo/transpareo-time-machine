product:
  name:
    en: Essential Crew Neck T-Shirt
    de: Essential Rundhals-T-Shirt
    fr: T-shirt essentiel à col rond
  brand: Nordic Wear
  description:
    en: Classic crew neck t-shirt made from 95% organic cotton and 5% elastane. Naturally dyed with plant-based indigo for a rich, lasting blue. Fair trade certified and produced in a zero-waste facility.
    de: Klassisches Rundhals-T-Shirt aus 95 % Bio-Baumwolle und 5 % Elasthan. Natürlich gefärbt mit pflanzlichem Indigo für ein tiefes, beständiges Blau. Fair-Trade-zertifiziert und in einer abfallfreien Manufaktur gefertigt.
    fr: T-shirt classique à col rond en 95 % de coton biologique et 5 % d'élasthanne. Teint naturellement à l'indigo végétal pour un bleu profond et durable. Certifié commerce équitable et fabriqué dans un atelier sans déchets.
  category:
    en: T-Shirts
    de: T-Shirts
    fr: T-shirts
  gtin: "4012345678901"
  weight: 180
  weight_unit: g
  rating: good
  compositions:
    - key: material
      title:
        en: Material composition
        de: Materialzusammensetzung
        fr: Composition des matériaux
      icon: sliders
      entries:
        - name:
            en: Organic Cotton
