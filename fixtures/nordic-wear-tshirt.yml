      label:
        en: Certifications
        de: Zertifizierungen
        fr: Certifications
      values:
        - GOTS Organic
        - OEKO-TEX Standard 100
        - Fair Trade
      icon: certificate
  accordions:
    - key: care
      label:
        en: Care instructions
        de: Pflegehinweise
        fr: Instructions d'entretien
      icon: leaf
      body:
        en: Wash at 30 C; line dry; iron at low heat.
        de: Bei 30 °C waschen; an der Luft trocknen; bei niedriger Temperatur bügeln.
        fr: Laver à 30 °C ; sécher à l'air libre ; repasser à basse température.
    - key: disposal
      label:
        en: Disposal & recycling
        de: Entsorgung & Recycling
        fr: Élimination et recyclage
      icon: recycle
      body:
        en: At end of life, separate the cotton body (home-compostable in industrial composting) from any sewn-in care label. Drop off at a textile collection point or send back to Nordic Wear via the prepaid return label.
        de: Am Ende der Nutzungsdauer den Baumwollkorpus (in industriellen Kompostieranlagen kompostierbar) von eingenähten Pflegeetiketten trennen. An einer Textilsammelstelle abgeben oder mit dem vorfrankierten Rücksendeetikett an Nordic Wear zurückschicken.
        fr: En fin de vie, séparer le corps en coton (compostable en compostage industriel) de toute étiquette d'entretien cousue. Déposer dans un point de collecte textile ou renvoyer à Nordic Wear via l'étiquette de retour prépayée.
    - key: repair
      label:
        en: Repair guidance
        de: Reparaturhinweise
        fr: Conseils de réparation
      icon: wrench
      body:
        en: Reinforce loose seams with a matching cotton thread (Tex 24). Replace neckline binding every 2-3 years if it loses elasticity.
        de: Lose Nähte mit passendem Baumwollgarn (Tex 24) verstärken. Die Halsausschnitt-Einfassung alle 2-3 Jahre erneuern, wenn sie an Elastizität verliert.
        fr: Renforcer les coutures qui se défont avec un fil de coton assorti (Tex 24). Remplacer la bordure de l'encolure tous les 2 à 3 ans si elle perd son élasticité.
