  description:
    en: Portable 2 kWh LFP power station with a 1500 W AC inverter, 600 W solar input, and a 6-port output array. Designed for off-grid, RV, and emergency backup use; CE-marked and EU Battery Regulation compliant. Modular replaceable cells and a published dismantling manual support a >90% recyclability target.
    de: Tragbare 2-kWh-LFP-Stromspeicherstation mit 1500-W-Wechselrichter, 600-W-Solareingang und sechs Ausgängen. Konzipiert für netzunabhängigen Einsatz, Wohnmobile und Notstromversorgung; CE-zertifiziert und konform mit der EU-Batterieverordnung. Modular tauschbare Zellen und ein veröffentlichtes Demontagehandbuch unterstützen ein Recyclingziel von über 90 %.
    fr: Station d'énergie portable LFP de 2 kWh avec onduleur 1500 W, entrée solaire 600 W et six ports de sortie. Conçue pour l'usage hors réseau, les camping-cars et le secours d'urgence ; certifiée CE et conforme au règlement européen sur les batteries. Cellules modulaires remplaçables et manuel de démontage publié soutiennent un objectif de recyclabilité supérieur à 90 %.
