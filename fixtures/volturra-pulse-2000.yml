events:
  - id: evt-1
    event_type: published
    occurred_at: 2024-03-01T09:00:00Z
    actor_label: Lorenzo Bianchi
    description:
      en: Initial Digital Product Passport published for the Pulse 2000 platform.
      de: Erster digitaler Produktpass für die Pulse-2000-Plattform veröffentlicht.
      fr: Premier passeport numérique de produit publié pour la plateforme Pulse 2000.
    version: 1
  - id: evt-1a
    event_type: inspection
    occurred_at: 2024-03-18T11:00:00Z
    actor_label: TÜV Italia (electrical safety)
    description:
      en: IEC 62133-2 cell-safety test report issued; all 50 sample cells passed thermal-runaway, crush, and overcharge protocols.
      de: IEC-62133-2-Zellsicherheitsprüfbericht ausgestellt; alle 50 Probenzellen bestanden Thermal-Runaway-, Quetsch- und Überladeprotokolle.
      fr: Rapport de sécurité cellulaire IEC 62133-2 délivré ; les 50 cellules échantillons ont réussi les protocoles de runaway thermique, d'écrasement et de surcharge.
  - id: evt-1b
    event_type: inspection
    occurred_at: 2024-04-02T09:30:00Z
    actor_label: Bureau Veritas (transport)
    description:
      en: UN 38.3 transport-safety test certificate issued; battery cleared for air, sea, road, and rail freight under UN3480 / UN3481.
      de: UN-38.3-Transportsicherheits-Prüfzertifikat ausgestellt; Batterie freigegeben für Luft-, See-, Straßen- und Schienenfracht gemäß UN3480 / UN3481.
      fr: Certificat de sécurité de transport UN 38.3 délivré ; batterie autorisée pour le transport aérien, maritime, routier et ferroviaire sous UN3480 / UN3481.
  - id: evt-2
    event_type: lifecycle_transition
    occurred_at: 2024-06-15T08:00:00Z
    actor_label: Lorenzo Bianchi
    status_from: draft
    status_to: placed_on_market
    description:
      en: First production batch (BATCH-VOL-2024-Q1-014) released to EU distribution partners with full CE marking and conformity dossier.
      de: Erste Produktionscharge (BATCH-VOL-2024-Q1-014) an EU-Vertriebspartner ausgeliefert mit vollständiger CE-Kennzeichnung und Konformitätsdossier.
      fr: Premier lot de production (BATCH-VOL-2024-Q1-014) livré aux partenaires de distribution UE avec marquage CE complet et dossier de conformité.
    version: 2
  - id: evt-2a
    event_type: registered_with_eu
    occurred_at: 2024-06-20T10:00:00Z
    actor_label: EU Battery Passport Registry
    description:
      en: Battery model VOL-PULSE-2000-EU registered in the EU Battery Passport central registry under Article 77; passport did issued.
      de: Batteriemodell VOL-PULSE-2000-EU im EU-Batteriepass-Zentralregister gemäß Artikel 77 registriert; Passkennung vergeben.
      fr: Modèle de batterie VOL-PULSE-2000-EU enregistré dans le registre central du passeport batterie UE selon l'Article 77 ; identifiant de passeport délivré.
  - id: evt-2b
    event_type: inspection
    occurred_at: 2024-07-03T14:00:00Z
    actor_label: EUCOBAT (collection network)
    description:
      en: Producer-responsibility registration confirmed for the EU; pre-paid take-back routing activated for all 27 member states.
      de: Herstellerverantwortungs-Registrierung für die EU bestätigt; vorausbezahlte Rücknahme-Routen für alle 27 Mitgliedstaaten aktiviert.
      fr: Inscription au régime de responsabilité du producteur confirmée pour l'UE ; routage de reprise prépayée activé pour les 27 États membres.
  - id: evt-3
    event_type: lifecycle_transition
    occurred_at: 2024-09-22T13:30:00Z
    actor_label: Volturra backend
    status_from: placed_on_market
    status_to: in_use
    description:
      en: First customer activation recorded; commissioning telemetry transmitted by the BMS to the Volturra cloud.
      de: Erste Kundenaktivierung erfasst; Inbetriebnahme-Telemetrie vom BMS an die Volturra-Cloud übertragen.
      fr: Première activation client enregistrée ; télémétrie de mise en service transmise par le BMS au cloud Volturra.
    version: 3
  - id: evt-3a
    event_type: inspection
    occurred_at: 2025-03-15T10:00:00Z
    actor_label: Volturra Quality Assurance
    description:
      en: 6-month state-of-health audit on a representative unit population (n=120); median SoH 99.1%, no outliers exceeding cell-balancing thresholds.
      de: 6-monatige State-of-Health-Prüfung an einer repräsentativen Geräteauswahl (n=120); Median SoH 99,1 %, keine Ausreißer über den Zellausgleichs-Grenzwerten.
      fr: Audit d'état de santé à 6 mois sur un échantillon représentatif d'unités (n=120) ; SoH médian 99,1 %, aucun outlier au-delà des seuils d'équilibrage des cellules.
  - id: evt-3b
    event_type: inspection
    occurred_at: 2025-05-08T09:00:00Z
    actor_label: ECOCHEM Lab (carbon footprint)
    description:
      en: Annual third-party verification of the cradle- to-gate carbon footprint declaration; measured 71 kg CO2e/kWh, within 2% of the declared value. Performance class B confirmed.
      de: Jährliche unabhängige Überprüfung der Cradle-to-Gate-CO2-Fußabdruck-Deklaration; gemessen 71 kg CO2e/kWh, innerhalb von 2 % des deklarierten Wertes. Leistungsklasse B bestätigt.
      fr: Vérification annuelle indépendante de la déclaration d'empreinte carbone cradle-to-gate ; 71 kg CO2e/kWh mesurés, dans la marge de 2 % de la valeur déclarée. Classe de performance B confirmée.
  - id: evt-4
    event_type: repair
    occurred_at: 2025-08-15T10:15:00Z
    actor_label: Volturra Service Centre Milano
    description:
      en: BMS firmware update v1.3.7 to v1.4.2 deployed over the air; coulomb-counting calibration improved. No hardware modification, no impact on declared specifications.
      de: BMS-Firmware-Update v1.3.7 to v1.4.2 over the air ausgerollt; Coulomb-Zählerkalibrierung verbessert. Keine Hardware-Änderung, keine Auswirkung auf die deklarierten Spezifikationen.
      fr: Mise à jour du firmware BMS v1.3.7 to v1.4.2 déployée par voie aérienne ; calibrage du comptage coulombique amélioré. Aucune modification matérielle, aucun impact sur les spécifications déclarées.
    version: 4
  - id: evt-4a
    event_type: inspection
    occurred_at: 2026-02-28T11:00:00Z
    actor_label: TÜV SÜD (annual EU compliance)
    description:
      en: Annual EU Battery Regulation compliance review passed; declared values for capacity, cycle life, carbon footprint, and recycled content verified against production records and field telemetry.
      de: Jährliche Konformitätsprüfung gemäß EU-Batterieverordnung bestanden; deklarierte Werte für Kapazität, Zyklenlebensdauer, CO2-Fußabdruck und Recyclinganteil mit Produktionsnachweisen und Feldtelemetrie abgeglichen.
      fr: Examen annuel de conformité au règlement UE sur les batteries réussi ; valeurs déclarées pour la capacité, la durée de vie en cycles, l'empreinte carbone et le contenu recyclé vérifiées par rapport aux registres de production et à la télémétrie de terrain.
  - id: evt-4b
    event_type: inspection
    occurred_at: 2026-04-20T15:00:00Z
    actor_label: Volturra Quality Assurance
    description:
      en: 18-month state-of-health checkpoint; median SoH across the v4-firmware fleet 96.4%, well within the 5-year warranty floor of 70%.
      de: 18-Monats-Zustandsprüfung; medianer SoH der v4-Firmware-Flotte bei 96,4 %, deutlich über der 5-Jahres-Garantieuntergrenze von 70 %.
      fr: Point d'état de santé à 18 mois ; SoH médian de la flotte sous firmware v4 à 96,4 %, bien au-dessus du seuil de garantie 5 ans de 70 %.
