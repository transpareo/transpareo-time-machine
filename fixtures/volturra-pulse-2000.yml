  accordions:
    - key: dismantling
      label:
        en: Dismantling instructions
        de: Demontageanleitung
        fr: Instructions de démontage
      icon: wrench
      body:
        en: "Authorized service only. (1) Discharge to ≤10% SoC and disconnect all loads. (2) Remove the eight T20 Torx screws on the rear panel. (3) Disconnect the BMS-to-cell harness at the orange high-voltage connector, wait 60 s for the bleeder resistor to discharge the bus capacitors. (4) Lift the modular 4-cell array out by the integrated handles; cells slot individually into recyclable trays. Full disassembly manual: volturra.example/dismantling."
        de: "Nur durch autorisierten Service. (1) Auf ≤10 % SoC entladen und alle Lasten trennen. (2) Acht T20-Torx-Schrauben an der Rückwand entfernen. (3) BMS-zu-Zelle-Kabelbaum am orangefarbenen Hochspannungsstecker trennen, 60 s warten, bis der Bleeder-Widerstand die Buskondensatoren entladen hat. (4) Modulares 4-Zellen-Pack an den integrierten Griffen anheben; Zellen lassen sich einzeln in recycelbare Trays einlegen. Vollständige Demontageanleitung: volturra.example/dismantling."
        fr: "Service autorisé uniquement. (1) Décharger à ≤10 % SoC et déconnecter toutes les charges. (2) Retirer les huit vis Torx T20 du panneau arrière. (3) Débrancher le faisceau BMS-cellule au connecteur haute tension orange, attendre 60 s la décharge des condensateurs par la résistance de purge. (4) Soulever le pack modulaire de 4 cellules par les poignées intégrées ; les cellules s'insèrent individuellement dans des plateaux recyclables. Manuel de démontage complet : volturra.example/dismantling."
    - key: recycling
      label:
        en: End-of-life & recycling
        de: Entsorgung & Recycling
        fr: Fin de vie & recyclage
      icon: recycle
      body:
        en: Do NOT dispose of this battery with household waste. Volturra is registered with EUCOBAT and provides free collection across the EU via volturra.example/recycle. Each unit's cells, BMS, inverter, and casing are processed through separate streams targeting a 90% material recovery rate (cobalt-free chemistry exceeds the EU 2031 lithium-recovery target of 80%).
        de: Diese Batterie NICHT im Hausmüll entsorgen. Volturra ist bei EUCOBAT registriert und bietet EU-weit kostenlose Rücknahme über volturra.example/recycle. Zellen, BMS, Wechselrichter und Gehäuse jeder Einheit werden in getrennten Stoffströmen verarbeitet mit dem Ziel einer Materialrückgewinnung von 90 % (cobaltfreie Chemie übertrifft das EU-2031-Ziel von 80 % Lithium-Rückgewinnung).
        fr: NE PAS jeter cette batterie avec les déchets ménagers. Volturra est enregistré auprès d'EUCOBAT et propose une collecte gratuite dans toute l'UE via volturra.example/recycle. Les cellules, le BMS, l'onduleur et le boîtier de chaque unité sont traités dans des flux séparés visant un taux de récupération matière de 90 % (la chimie sans cobalt dépasse l'objectif UE 2031 de 80 % pour le lithium).
    - key: warranty
      label:
        en: Warranty
        de: Garantie
        fr: Garantie
      icon: certificate
      body:
        en: 5-year limited warranty covering manufacturing defects and capacity retention ≥70% at year 5 under typical use (1 cycle/day, 25°C ambient). Excludes damage from drops, water beyond IP54, and unauthorized firmware modifications.
        de: 5 Jahre begrenzte Garantie auf Herstellungsfehler und einen Kapazitätserhalt von ≥70 % nach 5 Jahren bei typischer Nutzung (1 Zyklus/Tag, 25 °C Umgebung). Ausgenommen sind Schäden durch Stürze, Wasser über IP54 hinaus und nicht autorisierte Firmware-Modifikationen.
        fr: Garantie limitée 5 ans couvrant les défauts de fabrication et la rétention de capacité ≥70 % à l'année 5 sous usage typique (1 cycle/jour, 25 °C ambiant). Exclut les dommages dus aux chutes, à l'eau au-delà d'IP54 et aux modifications firmware non autorisées.
    - key: safety
      label:
        en: Safety guidance
        de: Sicherheitshinweise
        fr: Consignes de sécurité
      icon: shield
      body:
        en: LFP chemistry is thermally stable and does not undergo runaway under normal conditions. In the event of physical damage, isolate the unit outdoors away from combustibles and contact Volturra support, do NOT submerge in water. For fire suppression, use a Class D extinguisher or copious sand/dry earth.
        de: LFP-Chemie ist thermisch stabil und neigt unter normalen Bedingungen nicht zum Durchgehen. Bei physischer Beschädigung das Gerät im Freien fern von brennbaren Materialien isolieren und den Volturra-Support kontaktieren, NICHT in Wasser tauchen. Zur Brandbekämpfung Klasse-D-Löscher oder reichlich Sand/trockene Erde verwenden.
        fr: La chimie LFP est thermiquement stable et ne subit pas d'emballement dans des conditions normales. En cas de dommage physique, isoler l'appareil à l'extérieur, loin de tout combustible, et contacter le support Volturra, NE PAS immerger dans l'eau. Pour l'extinction, utiliser un extincteur de classe D ou abondamment du sable/terre sèche.
    - key: due_diligence
      label:
        en: Critical raw materials due diligence
        de: Sorgfaltspflicht für kritische Rohstoffe
        fr: Diligence raisonnable matières premières
      icon: key
      body:
        en: Volturra's supply-chain due-diligence policy (volturra.example/due-diligence) covers cobalt, lithium, natural graphite, nickel, tin, tantalum, tungsten, and gold per Annex X of Regulation 2023/1542. Independent third-party audits are filed annually with the Italian competent authority (MASE). Conflict-affected and high-risk areas are excluded from the approved-supplier list.
        de: Volturras Lieferketten-Sorgfaltspflicht (volturra.example/due-diligence) deckt Cobalt, Lithium, Naturgraphit, Nickel, Zinn, Tantal, Wolfram und Gold gemäß Anhang X der Verordnung 2023/1542 ab. Unabhängige Drittprüfungen werden jährlich bei der italienischen zuständigen Behörde (MASE) eingereicht. Konfliktbetroffene und Hochrisikogebiete sind aus der Liste zugelassener Lieferanten ausgeschlossen.
        fr: La politique de diligence raisonnable de Volturra (volturra.example/due-diligence) couvre le cobalt, le lithium, le graphite naturel, le nickel, l'étain, le tantale, le tungstène et l'or selon l'Annexe X du règlement 2023/1542. Des audits indépendants tiers sont déposés annuellement auprès de l'autorité italienne compétente (MASE). Les zones de conflit et à haut risque sont exclues de la liste des fournisseurs approuvés.
    - key: negative_events
      label:
        en: Negative-event log
        de: Negative Ereignisse
        fr: Journal des événements négatifs
      icon: shield
      body:
        en: "No negative events recorded. Through the 2026-04-20 audit, the v4-firmware fleet (n=120) has logged zero entries across the eight categories the regulation tracks: accident, physical damage, thermal event, electrical fault, water ingress, overcharge, deep discharge, short-circuit. The BMS continues to monitor and report each category in real-time; any future incident is appended to this log with a severity rating and an occurrence timestamp."
        de: "Keine Negativereignisse erfasst. Bis zum Audit vom 2026-04-20 hat die v4-Firmware-Flotte (n=120) keine Einträge in den acht von der Verordnung erfassten Kategorien protokolliert: Unfall, physische Beschädigung, thermisches Ereignis, elektrischer Fehler, Wassereintritt, Überladung, Tiefentladung, Kurzschluss. Das BMS überwacht und meldet jede Kategorie weiterhin in Echtzeit; jeder zukünftige Vorfall wird hier mit einer Schweregradeinstufung und Zeitstempel angehängt."
        fr: "Aucun événement négatif enregistré. Jusqu'à l'audit du 20-04-2026, la flotte sous firmware v4 (n=120) n'a journalisé aucune entrée dans les huit catégories suivies par le règlement : accident, dommage physique, événement thermique, défaut électrique, infiltration d'eau, surcharge, décharge profonde, court-circuit. Le BMS continue de surveiller et de signaler chaque catégorie en temps réel ; tout incident futur est ajouté ici avec un niveau de gravité et un horodatage."
  manufacturer:
    name: Volturra Energia S.p.A.
    street: Via Galvani 17
    city: 20121 Milano
    country: Italy
